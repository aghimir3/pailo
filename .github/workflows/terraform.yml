# ─────────────────────────────────────────────────────────────────────────────
# Terraform Plan & Apply
#
# - On PRs that touch infra/: plan and post diff as PR comment
# - On main push: plan only (review in Actions tab)
# - Manual dispatch with apply=true: plan + apply
#
# Required Repository Variables:
#   AWS_ROLE_ARN  – IAM role ARN for GitHub OIDC
# ─────────────────────────────────────────────────────────────────────────────

name: Terraform

on:
  pull_request:
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml
  push:
    branches: [main]
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the plan to production?"
        required: true
        default: false
        type: boolean

concurrency:
  group: terraform-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: ap-south-1
  TF_IN_AUTOMATION: true
  TF_DIR: infra/terraform

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Require AWS role
        if: ${{ vars.AWS_ROLE_ARN == '' }}
        run: |
          echo "::error::Set the AWS_ROLE_ARN repository variable."
          exit 1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Format check
        run: terraform -chdir=$TF_DIR fmt -check -recursive

      - name: Init
        run: terraform -chdir=$TF_DIR init

      - name: Validate
        run: terraform -chdir=$TF_DIR validate

      - name: Plan
        id: plan
        run: |
          set +e
          terraform -chdir=$TF_DIR plan -detailed-exitcode -out=tfplan 2>&1 | tee plan_output.txt
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          else
            echo "::error::Terraform plan failed"
            exit 1
          fi

      - name: Post plan to PR
        if: github.event_name == 'pull_request' && steps.plan.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) : plan;
            const body = `### Terraform Plan\n\n<details>\n<summary>Show Plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Plan summary
        if: steps.plan.outputs.has_changes == 'true'
        run: |
          echo "## Terraform Plan" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -30 plan_output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.apply == true &&
      github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Init
        run: terraform -chdir=$TF_DIR init

      - name: Apply
        run: terraform -chdir=$TF_DIR apply -auto-approve

      - name: Apply summary
        run: |
          echo "## Terraform Applied" >> "$GITHUB_STEP_SUMMARY"
          echo "Infrastructure changes applied to production." >> "$GITHUB_STEP_SUMMARY"
