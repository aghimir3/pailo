name: Pailo AWS Infrastructure Terraform Plan And Apply

on:
  pull_request:
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml
  push:
    branches: [main]
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:
    inputs:
      apply:
        description: Apply the Terraform plan to AWS
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Plan Or Apply AWS Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require AWS role
        if: ${{ vars.AWS_ROLE_ARN == '' }}
        run: |
          echo "Set the AWS_ROLE_ARN repository variable to the github_actions_role_arn Terraform output."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.1

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=infra/terraform init

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -out=tfplan

      - name: Terraform apply
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true && github.ref == 'refs/heads/main' }}
        run: terraform -chdir=infra/terraform apply -auto-approve tfplan
