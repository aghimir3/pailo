# ─── GitHub Setup Required ───────────────────────────────────────────────────
# Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_ROLE_ARN             – IAM role ARN for GitHub OIDC (terraform output: github_actions_role_arn)
#   AWS_REGION               – (optional, defaults to ap-south-1)
#   BACKEND_ECR_REPOSITORY   – (optional, defaults to pailo-prod/backend)
#   BACKEND_LOG_GROUP        – (optional, defaults to /ecs/pailo-prod/backend)
#   ECS_CLUSTER              – (optional, defaults to pailo-prod-cluster)
#   ECS_SERVICE              – (optional, defaults to pailo-prod-app)
#   FRONTEND_ECR_REPOSITORY  – (optional, defaults to pailo-prod/frontend)
#
# OIDC Identity Provider:
#   Create an IAM OIDC provider for token.actions.githubusercontent.com
#   in your AWS account (the bootstrap Terraform module does this).
#
# ECR Repositories:
#   The frontend and backend ECR repos must exist before first deploy
#   (created by the main Terraform apply).
# ─────────────────────────────────────────────────────────────────────────────

name: Pailo Production ECS Image Build And Deploy

on:
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY || 'pailo-prod/backend' }}
  BACKEND_LOG_GROUP: ${{ vars.BACKEND_LOG_GROUP || '/ecs/pailo-prod/backend' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'pailo-prod-cluster' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'pailo-prod-app' }}
  FRONTEND_ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY || 'pailo-prod/frontend' }}

jobs:
  deploy:
    name: Build Frontend And Backend Images, Then Deploy ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require AWS role
        if: ${{ vars.AWS_ROLE_ARN == '' }}
        run: |
          echo "Set the AWS_ROLE_ARN repository variable to the github_actions_role_arn Terraform output."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch Cognito config from SSM
        id: cognito
        run: |
          echo "user_pool_id=$(aws ssm get-parameter --name /pailo-prod/cognito/user-pool-id --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "client_id=$(aws ssm get-parameter --name /pailo-prod/cognito/client-id --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "domain=$(aws ssm get-parameter --name /pailo-prod/app/domain --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "cognito_domain_prefix=$(aws cognito-idp describe-user-pool --user-pool-id $(aws ssm get-parameter --name /pailo-prod/cognito/user-pool-id --query Parameter.Value --output text) --query UserPool.Domain --output text)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ steps.cognito.outputs.user_pool_id }}
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ steps.cognito.outputs.client_id }}
            NEXT_PUBLIC_COGNITO_DOMAIN=${{ steps.cognito.outputs.cognito_domain_prefix }}.auth.${{ env.AWS_REGION }}.amazoncognito.com
            NEXT_PUBLIC_APP_URL=https://${{ steps.cognito.outputs.domain }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:latest

      - name: Run backend database migrations on ECS
        run: |
          set -euo pipefail

          service_json="$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE")"
          task_definition="$(echo "$service_json" | jq -r '.services[0].taskDefinition')"
          assign_public_ip="$(echo "$service_json" | jq -r '.services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp')"
          network_configuration="$(echo "$service_json" | jq -c --arg assign_public_ip "$assign_public_ip" '{awsvpcConfiguration:{subnets:.services[0].networkConfiguration.awsvpcConfiguration.subnets,securityGroups:.services[0].networkConfiguration.awsvpcConfiguration.securityGroups,assignPublicIp:$assign_public_ip}}')"
          overrides='{"containerOverrides":[{"name":"backend","command":["alembic","-c","alembic.ini","upgrade","head"]}]}'

          task_arn="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$task_definition" \
            --network-configuration "$network_configuration" \
            --overrides "$overrides" \
            --query 'tasks[0].taskArn' \
            --output text)"

          if [ -z "$task_arn" ] || [ "$task_arn" = "None" ]; then
            echo "Failed to start migration task."
            exit 1
          fi

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$task_arn"
          exit_code="$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$task_arn" --query 'tasks[0].containers[?name==`backend`].exitCode | [0]' --output text)"

          if [ "$exit_code" != "0" ]; then
            echo "Migration task failed with backend exit code $exit_code. Recent backend logs:"
            aws logs tail "$BACKEND_LOG_GROUP" --since 15m || true
            exit 1
          fi

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
