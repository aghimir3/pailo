# ─────────────────────────────────────────────────────────────────────────────
# CI Quality Gates
# Runs on every push and PR. All jobs must pass before deploy triggers.
# No secrets or repository variables required.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.9"

      - name: Generate API client
        run: corepack pnpm generate:api

      - name: Lint frontend (ESLint)
        run: corepack pnpm lint

      - name: Typecheck frontend (tsc)
        run: corepack pnpm typecheck

      - name: Lint backend (ruff)
        run: corepack pnpm lint:backend

      - name: Typecheck backend (mypy)
        run: corepack pnpm typecheck:backend

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: pailo
          POSTGRES_PASSWORD: pailo
          POSTGRES_USER: pailo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pailo -d pailo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    env:
      DATABASE_URL: postgresql+asyncpg://pailo:pailo@127.0.0.1:5432/pailo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.9"

      - name: Run migrations
        run: corepack pnpm db:migrate

      - name: Check migration drift
        run: corepack pnpm db:check

      - name: Run tests
        run: corepack pnpm test:backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm build:frontend

  terraform-check:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Format check
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Validate
        run: terraform -chdir=infra/terraform validate
