services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: pailo
      POSTGRES_PASSWORD: pailo
      POSTGRES_USER: pailo
    ports:
      - "55432:5432"
    volumes:
      - postgres-data-18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pailo -d pailo"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: pailo-backend:local
    environment:
      DATABASE_URL: postgresql+asyncpg://pailo:pailo@db:5432/pailo
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: pailo-frontend:local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres-data-18:
